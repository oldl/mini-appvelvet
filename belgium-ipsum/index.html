    <script>
(() => {
  // Dictionnaire FR unique
const FR = [
  "alleï quoi","amaï zeg","aubette","après","da mé une bais","gros bazoef","bèke",
  "fais le blinquer","envoie les bollekes","ça est des carabistouilles",
  "zinneke","ketje","schieven architekt","stoemp","smoel",
  "caberdouche","babeler","brol","boentje","dringuelle","fritkot",
  "ket","zwanze","zinnekes","fieu","non peut-être","tof","snul",
  "snotneus","spek","volle pétrole","zot","tonneklinker","trekploste",
  "strondboer","schramoelenbak","smoetbol","smokkeleer",
  "à hoût-si-plou","j'ai bon","ça m'a bien goûté","ça peut mal","ça spite",
  "donner une baise","mords sur ta chique","je me suis pris une de ces douffes hier",
  "trek ton plan","ça plèque", "van ipsumeke", "doefLorem", "non peut-être", "oui sans doute",
  "à pouf", "baraki", "saisi", "dikkenek", "on se dit quoi", "en stoemelings", "un pain français astablieft", 
  /* … liste complète issue du CSV … */
];
  const $ = (id) => document.getElementById(id);
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  function clampInt(v, min, max, fallback){
    const n = parseInt(v, 10);
    if (Number.isNaN(n)) return fallback;
    return Math.max(min, Math.min(max, n));
  }
  function sentence(min = 8, max = 16){
    const n = min + Math.floor(Math.random() * (max - min + 1));
    const w = Array.from({ length: n }, () => pick(FR));
    w[0] = w[0].charAt(0).toUpperCase() + w[0].slice(1);
    return w.join(" ") + ".";
  }
  function paragraph(){
    const n = 3 + Math.floor(Math.random() * 4);
    return Array.from({ length: n }, () => sentence()).join(" ");
  }
  function words(count){
    return Array.from({ length: count }, () => pick(FR)).join(" ");
  }
  function makeLanding(opt){
    const cta = opt.cta ? "CTA: Découvrir | Voir la démo" : "";
    const h1 = opt.titles ? `H1: ${sentence(6,10).replace(/\.$/,"")}\n\n` : "";
    const hero = `${sentence(14,22)}\n${cta}\n\n`;
    const s1 = `${opt.titles ? "H2: " + sentence(5,8).replace(/\.$/,"") + "\n" : ""}${paragraph()}\n\n`;
    const s2 = `${opt.titles ? "H2: " + sentence(5,8).replace(/\.$/,"") + "\n" : ""}${paragraph()}\n\n`;
    const list = opt.lists ? `- ${sentence(6,10)}\n- ${sentence(6,10)}\n- ${sentence(6,10)}\n\n` : "";
    const faq = `${opt.titles ? "H2: FAQ\n" : "FAQ\n"}Q1: ${sentence(6,10).replace(/\.$/,"")}?\nA: ${sentence(12,18)}\n\nQ2: ${sentence(6,10).replace(/\.$/,"")}?\nA: ${sentence(12,18)}\n`;
    return h1 + hero + s1 + s2 + list + faq;
  }
  function makeCards(count){
    const items = [];
    for (let i = 1; i <= count; i++){
      const title = sentence(4,7).replace(/\.$/,"");
      let ex = (sentence(10,14) + " " + sentence(10,14)).trim();
      ex = ex.slice(0, 165).replace(/\s+\S*$/, "") + "…";
      const body = paragraph() + " " + paragraph();
      items.push(
        `Item ${i}\nTitle: ${title}\nExcerpt: ${ex}\nCTA: En savoir plus\nBody: ${body}\n`
      );
    }
    return items.join("\n");
  }
  function makeMicrocopy(){
    return [
      "Label: Lorem ipsum",
      "Placeholder: Lorem ipsum",
      "Help text: " + sentence(10,14),
      "Error: Une erreur est survenue. Veuillez réessayer.",
      "Success: Merci, votre demande a bien été envoyée."
    ].join("\n");
  }
  function toHTML(text){
    const lines = text.split("\n");
    let html = [];
    let inList = false;
    const flushList = () => { if (inList){ html.push("</ul>"); inList = false; } };
    for (const raw of lines){
      const line = raw.trim();
      if (!line){ flushList(); html.push("<p></p>"); continue; }
      if (line.startsWith("H1: ")){ flushList(); html.push(`<h1>${esc(line.slice(4))}</h1>`); continue; }
      if (line.startsWith("H2: ")){ flushList(); html.push(`<h2>${esc(line.slice(4))}</h2>`); continue; }
      if (line.startsWith("- ")){
        if (!inList){ html.push("<ul>"); inList = true; }
        html.push(`<li>${esc(line.slice(2))}</li>`);
        continue;
      }
      flushList();
      html.push(`<p>${esc(line)}</p>`);
    }
    flushList();
    return html.join("\n");
  }
  const esc = (s) => s.replace(/[&<>"']/g, m =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])
  );
  function setStatus(msg){ $("lg_status").textContent = msg; }
  function setStats(txt){ $("lg_stats").textContent = `${txt.length} caractères`; }
  function generate(){
    const type = $("lg_type").value;
    const count = clampInt($("lg_count").value, 1, 80, 3);
    const opt = {
      titles: $("lg_titles").checked,
      lists: $("lg_lists").checked,
      cta: $("lg_cta").checked,
      html: $("lg_html").checked
    };
    let out = "";
    if (type === "words") out = words(count);
    if (type === "sentences") out = Array.from({ length: count }, () => sentence()).join(" ");
    if (type === "paragraphs") out = Array.from({ length: count }, () => paragraph()).join("\n\n");
    if (type === "landing") out = makeLanding(opt);
    if (type === "cards") out = makeCards(count);
    if (type === "microcopy") out = makeMicrocopy();
    if (opt.html) out = toHTML(out);
    $("lg_output").value = out;
    setStatus(`Généré · ${type} · x${count}`);
    setStats(out);
  }
  async function copy(){
    const txt = $("lg_output").value;
    if (!txt){ setStatus("Rien à copier."); return; }
    try{
      await navigator.clipboard.writeText(txt);
      setStatus("Copié dans le presse-papiers.");
    }catch(e){
      $("lg_output").select();
      document.execCommand("copy");
      setStatus("Copié.");
    }
  }
  function reset(){
    $("lg_type").value = "paragraphs";
    $("lg_count").value = 3;
    $("lg_titles").checked = false;
    $("lg_lists").checked = false;
    $("lg_cta").checked = true;
    $("lg_html").checked = false;
    $("lg_output").value = "";
    generate();
  }
  $("lg_generate").addEventListener("click", generate);
  $("lg_copy").addEventListener("click", copy);
  $("lg_reset").addEventListener("click", reset);
  generate();
})();
</script>
