};
function setVar(name, value){
  document.documentElement.style.setProperty(name, value);
}
function toRgba(hex, alpha){
  // hex "#rrggbb" -> rgba(r,g,b,a)
  const h = hex.replace("#", "");
  if(h.length !== 6) return hex;
  const r = parseInt(h.slice(0,2), 16);
  const g = parseInt(h.slice(2,4), 16);
  const b = parseInt(h.slice(4,6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function applyTheme(theme){
  Object.entries(theme).forEach(([k,v]) => setVar(k, v));
}
function saveTheme(theme){
  localStorage.setItem(THEME_KEY, JSON.stringify(theme));
}
function loadTheme(){
  try{
    const raw = localStorage.getItem(THEME_KEY);
    if(!raw) return null;
    const t = JSON.parse(raw);
    return (t && typeof t === "object") ? t : null;
  } catch {
    return null;
  }
}
/* ---- Wire UI ---- */

const cLine = document.getElementById("cLine");
const cGrid = document.getElementById("cGrid");
const cDone = document.getElementById("cDone");
const themeReset = document.getElementById("themeReset");
function readPickersToTheme(){
  const line = toRgba(cLine.value, 0.90);
  const grid = toRgba(cGrid.value, 0.14);
  return {
    "--bg": cBg.value,
    "--fg": cFg.value,
    "--line": line,
    "--grid": grid,
    "--tile-bg": cBg.value,
    "--tile-done": cDone.value,
    /* ✅ pour que inputs/boutons/dock suivent FG/BG */
    "--ui-bg": cBg.value,
    "--ui-fg": cFg.value,
  };
}
function syncPickersFromTheme(theme){
  if(theme["--bg"]) cBg.value = theme["--bg"];
  if(theme["--fg"]) cFg.value = theme["--fg"];
  if(theme["--tile-done"]) cDone.value = theme["--tile-done"];
}
function applyCustomFromPickers(){
  const theme = readPickersToTheme();
  applyTheme(theme);
  saveTheme(theme);
  presetEl.value = "custom";
}
presetEl.addEventListener("change", () => {
  const v = presetEl.value;
  if(v === "custom"){
    applyCustomFromPickers();
    return;
  }
  const preset = PRESETS[v];
  if(!preset) return;
  applyTheme(preset);
  saveTheme(preset);
  syncPickersFromTheme(preset);
});
[cBg,cFg,cLine,cGrid,cDone].forEach(el => {
  el.addEventListener("input", applyCustomFromPickers);
});
themeReset.addEventListener("click", () => {
  const preset = PRESETS.default;

  saveTheme(preset);
  presetEl.value = "default";

});
/* ---- boot theme ---- */
const saved = loadTheme();
if(saved){

} else {

  presetEl.value = "default";
  syncPickersFromTheme(PRESETS.default);
}

    function rid(){
      return (crypto?.getRandomValues)
        ? [...crypto.getRandomValues(new Uint8Array(8))].map(b=>b.toString(16).padStart(2,"0")).join("")
        : String(Math.random()).slice(2);
    }
    function load(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return [];
        const arr = JSON.parse(raw);
        if(!Array.isArray(arr)) return [];
        return arr.map(t => ({
          id: String(t.id ?? rid()),
          text: String(t.text ?? "").slice(0, 280).trim(),
          done: Boolean(t.done),
          createdAt: Number(t.createdAt ?? Date.now())
        })).filter(t => t.text.length);
      } catch {
        return [];
      }
    }
    function save(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }
    function setMeta(){
      const total = todos.length;
      const done = todos.filter(t => t.done).length;
      meta.textContent = `${done}/${total} done`;
    }
    function fibClass(n){ return "f" + n; }
let slots = new Array(FIB7.length).fill(null);  // slots “visuels” (7)
let dragFrom = null;
function rebuildSlotsFromTodos(){
  slots = new Array(FIB7.length).fill(null);
  for(let i = 0; i < FIB7.length; i++){
    slots[i] = todos[i] ?? null;
  }
}
function commitSlotsToTodos(){
  // on compact (les vides disparaissent)
  todos = slots.filter(Boolean);
  save();
}
function render(){
  grid.innerHTML = "";
  setMeta();
  rebuildSlotsFromTodos();
  for(let i = 0; i < FIB7.length; i++){
    const span = FIB7[i];
    const t = slots[i]; // IMPORTANT : on rend depuis slots (pas todos direct)
    const tile = document.createElement("div");
const isLast = (i === FIB7.length - 1);
const isSecondOne = (span === 1 && isLast);
tile.className = `tile ${fibClass(span)} ${isSecondOne ? "f1b" : ""} ${t?.done ? "done" : ""}`;
    tile.style.setProperty("--s", String(span));
    tile.dataset.idx = String(i);
    // draggable uniquement si tâche présente
    tile.draggable = !!t;
    const title = document.createElement("p");
    title.className = "title";
    const foot = document.createElement("div");
    foot.className = "foot";
    const chipLeft = document.createElement("span");
    chipLeft.className = "chip";
    const chipRight = document.createElement("span");
    chipRight.className = "chip";
    chipRight.textContent = `F${span}`;
    if(t){
      title.textContent = t.text;
      chipLeft.textContent = t.done ? "done" : "todo";
      const del = document.createElement("div");
      del.className = "del";
      del.textContent = "✕";
      del.title = "Supprimer";
      del.addEventListener("click", (e) => {
        e.stopPropagation();
        slots[i] = null;
        commitSlotsToTodos();
        render();
      });
      tile.addEventListener("click", (e) => {
        if(e.target === del) return;
        t.done = !t.done;
        commitSlotsToTodos();
        render();
      });
      tile.addEventListener("keydown", (e) => {
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          t.done = !t.done;
          commitSlotsToTodos();
          render();
        }
      });
      tile.appendChild(del);
    } else {
      title.innerHTML = `<span class="emptyHint">— vide —</span>`;
      chipLeft.textContent = "add";
      tile.addEventListener("click", () => input.focus());
      tile.addEventListener("keydown", (e) => {
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          input.focus();
        }
      });
    }
    foot.appendChild(chipLeft);
    foot.appendChild(chipRight);
    tile.appendChild(title);
    tile.appendChild(foot);
    // ---------------------------
    // Drag & Drop (sur tous les slots, même vides)
    // ---------------------------
    tile.addEventListener("dragstart", (e) => {
      // dragstart arrive uniquement si draggable=true (donc t existe)
      dragFrom = i;
      tile.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      // petit hack pour Firefox : il faut un dataTransfer
      e.dataTransfer.setData("text/plain", String(i));
    });
    tile.addEventListener("dragend", () => {
      dragFrom = null;
      tile.classList.remove("dragging");
      [...grid.querySelectorAll(".drop-over")].forEach(el => el.classList.remove("drop-over"));
    });
    tile.addEventListener("dragover", (e) => {
      // autorise le drop partout
      e.preventDefault();
      tile.classList.add("drop-over");
      e.dataTransfer.dropEffect = "move";
    });
    tile.addEventListener("dragleave", () => {
      tile.classList.remove("drop-over");
    });
    tile.addEventListener("drop", (e) => {
      e.preventDefault();
      tile.classList.remove("drop-over");
      // récupération source
      const from = (dragFrom !== null) ? dragFrom : Number(e.dataTransfer.getData("text/plain"));
      const to = i;
      if(Number.isNaN(from) || from === null) return;
      if(from === to) return;
      // Move/swap :
      // - si cible vide => move
      // - sinon => swap
      if(slots[to] == null){
        slots[to] = slots[from];
        slots[from] = null;
      } else {
        const tmp = slots[to];
        slots[to] = slots[from];
        slots[from] = tmp;
      }
      commitSlotsToTodos();
      render();
    });
    grid.appendChild(tile);
  }
}
    function add(text){
      const cleaned = text.trim();
      if(!cleaned) return;
      // Ajout en tête: la plus importante prend le plus grand carré (F13)
      todos.unshift({ id: rid(), text: cleaned, done:false, createdAt: Date.now() });
      // On limite aux 7 visibles (Todonacci “7 carrés”) — si tu veux scroller au-delà, dis-moi.
      todos = todos.slice(0, 7);
      save();
      render();
    }
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      add(input.value);
      input.value = "";
      input.focus();
    });
    seedBtn.addEventListener("click", () => {
      if(todos.length) return;
      todos = [
        { id: rid(), text: "Passer dire bonjour à mammy pour lui donner 100 bisous", done:false, createdAt: Date.now()-600000 },
        { id: rid(), text: "Faire 100 squads demain ou après après demain à 6h00", done:false, createdAt: Date.now()-500000 },
        { id: rid(), text: "Lire guerre et paix", done:true, createdAt: Date.now()-400000 },
        { id: rid(), text: "Repasser mes chemises le dimanche", done:false, createdAt: Date.now()-300000 }
      ];
      save();
      render();
    });
    clearBtn.addEventListener("click", () => {
      todos = [];
      save();
      render();
    });
    render();
  </script>
