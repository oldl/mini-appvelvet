  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8f8f8;
      --border: #e0e0e0;
      --accent: #ff5a1f;
      --accent-dim: rgba(255,90,31,0.08);
      --text: #1a1a1a;
      --muted: #888;
      --dead: #cc2222;
      --dead-dim: rgba(204,34,34,0.07);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* HEADER */
    header{
  border-bottom: 1px solid var(--border);
  padding: 28px 40px 0;              /* 0 en bas, car la barre sticky gère son padding */
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px);
  z-index: 100;
}

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

.header-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.tagline {
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
  letter-spacing: 0.3px;
}

.header-center .search-wrap {
  width: 100%;
  max-width: 420px;
}
.brand-logo {
  display: flex;
  flex-direction: column;
}
.brand-logo img {
  height: 62px;
  width: auto;
  display: block;
}

.search-center {
  flex: 1;
  display: flex;
  justify-content: center;
}

.search-center .search-wrap {
  max-width: 420px;
  width: 100%;
}

.search-center {
  flex: 1;
  display: flex;
  justify-content: center;
}

.search-center .search-wrap {
  max-width: 420px;
  width: 100%;
}

    .brand p {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.3px;
      margin-top: 4px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-credit {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.header-credit a {
  text-decoration: none;
  color: var(--muted);
  transition: color 0.2s ease;
}

.header-credit a:hover {
  color: var(--accent);
}

.header-credit span {
  opacity: 0.4;
}
    .count-badge {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      color: var(--accent);
      line-height: 1;
      text-align: right;
    }

    .count-badge small {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      color: var(--muted);
      display: block;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* SEARCH + CONTROLS */
   .controls{
  position: sticky;
  top: 0;
  z-index: 120;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 40px;
}

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 280px;
    }

    .search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 14px 9px 38px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
  border-radius: 28px; /* ← arrondi */
  transition: all 0.2s ease;
}

    .search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
    .search-wrap input::placeholder { color: #bbb; }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #bbb;
    }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-pill {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2px;
      padding: 4px 11px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 20px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-pill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .filter-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .filter-pill .pill-count {
      font-size: 10px;
      opacity: 0.65;
      margin-left: 3px;
    }

    /* AIRTABLE CONFIG */
    .airtable-bar {
      background: #fafafa;
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 0;
      overflow: hidden;
      transition: height 0.3s;
    }

    .airtable-bar.open { height: 52px; }

    .airtable-bar input {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      outline: none;
      width: 220px;
      border-radius: 2px;
    }

    .airtable-bar input:focus { border-color: var(--accent); }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      padding: 6px 14px;
      border: 1px solid;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.85; }

    .btn-ghost {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }

    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* MAIN GRID */
    main {
      padding: 24px 20px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .category-section {
      margin-bottom: 48px;
    }

    .category-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .category-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .category-title .cat-count {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0;
    }

    /* LIST VIEW */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* CARD = LIST ITEM */
    .card {
      background: #fff;
      border: 1px solid transparent;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      transition: all 0.15s;
      cursor: pointer;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      padding: 10px 12px;
      border-radius: 6px;
    }

    .card:hover {
      background: #f9f9f9;
      border-color: var(--border);
      border-bottom-color: var(--border);
    }

    .card.archived { opacity: 0.38; }
    .card.archived:hover { opacity: 0.55; }
    .card.stale { opacity: 0.72; }

    /* FAVICON SQUARE */
    .card-favicon {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 8px;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #eee;
    }

    .card-favicon img {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    .card-favicon .favicon-letter {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* TEXT */
    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .card-top {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .card-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .card-url {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-desc {
      font-size: 12px;
      color: #777;
      line-height: 1.45;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .badge-year {
      font-size: 10px;
      font-weight: 500;
      color: #aaa;
      background: #f5f5f5;
      border: 1px solid #e8e8e8;
      border-radius: 3px;
      padding: 0 5px;
      line-height: 18px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-size {
      font-size: 10px;
      font-weight: 500;
      color: #888;
      background: #f5f5f5;
      border: 1px solid #e8e8e8;
      border-radius: 3px;
      padding: 0 5px;
      line-height: 18px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-archived {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      background: #fff0f0;
      border: 1px solid #ffb3b3;
      color: var(--dead);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-stale {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      background: #fff8ed;
      border: 1px solid #ffd08a;
      color: #b06000;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--muted);
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-family: 'Bebas Neue', cursive;
      font-size: 24px;
      color: #ccc;
      margin-bottom: 8px;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      max-width: 1400px;
      margin: 0 auto;
    }
 

    footer p { color: var(--muted); font-size: 12px; }
    footer a { color: var(--accent); text-decoration: none; }

.submit-link {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  background: transparent;
  border: 1px solid var(--accent);
  padding: 8px 20px;
  border-radius: 999px;   /* ← full rounded */
  transition: all 0.2s ease;
  cursor: pointer;
}

.submit-link:hover {
  background: var(--accent);
  color: #fff;
  transform: translateY(-1px);
}

    /* AIRTABLE CONFIG TOGGLE */
    .airtable-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .airtable-toggle:hover { color: var(--accent); }
    .airtable-toggle svg { width: 14px; height: 14px; }

    /* LOADING */
    .loading-spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid #eee;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      header { padding: 16px 20px 14px; }
      main { padding: 16px 12px 60px; }
      footer { padding: 16px 20px; }
      .airtable-bar { padding: 0 20px; }
      .brand-logo img { height: 38px; }
    }

    /* HIDDEN */
    .hidden { display: none !important; }

    /* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.modal {
  background: #fff;
  width: 420px;
  max-width: 90%;
  border-radius: 6px;
  padding: 20px;
  border: 1px solid var(--border);
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  animation: fadeIn 0.15s ease-out;
}

@keyframes fadeIn {
  from { transform: translateY(8px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.modal-header h3 {
  font-family: 'Bebas Neue', cursive;
  font-size: 22px;
  letter-spacing: 1px;
}

.modal-close {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--muted);
}

.modal-close:hover { color: var(--accent); }

.modal-body {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.modal-body input,
.modal-body textarea {
  border: 1px solid var(--border);
  padding: 8px 10px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  border-radius: 4px;
  outline: none;
}

.modal-body input:focus,
.modal-body textarea:focus {
  border-color: var(--accent);
}

.modal-body textarea {
  resize: vertical;
  min-height: 70px;
}

.brand {
  margin-top: 6px;
}

.brand p {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.submit-header {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 6px 16px;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.submit-header:hover {
  background: var(--accent);
  color: #fff;
  transform: translateY(-1px);
}

.header-actions{
  display:flex;
  flex-direction: column;
  gap: 8px;
}

/* submit appears on scroll */
.submit-hidden{
  opacity: 0;
  transform: translateY(-6px);
  pointer-events: none;
  transition: all .25s ease;
}
.submit-show{
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.back-to-top{
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 999;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(10px);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 999px;
  cursor: pointer;
  transition: all .2s ease;
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
}

.back-to-top:hover{
  transform: translateY(-2px);
  border-color: var(--accent);
  color: var(--accent);
}

.back-hidden{
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
}

.back-show{
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
  </style>
</head>

 <a class="brand-logo" href="#" onclick="setFilter('all'); return false;">

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); }
  catch { return url; }
}

function getThumbnailUrl(url, thumb) {
  if (thumb) return thumb;
  return `https://image.thum.io/get/width/600/crop/338/${url}`;
}

function getFaviconUrl(url) {
  const domain = getDomain(url);
  return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
}

function renderFilterPills() {
  const cats = getCategories();
  const container = document.getElementById('filter-pills');
  const allCount = data.length;

  const pillsHtml = CAT_ORDER.filter(c => c === 'all' || cats[c]).map(cat => {
    const label = CAT_LABELS[cat] || cat;
    const count = cat === 'all' ? allCount : (cats[cat] || 0);
    return `<button class="filter-pill" data-cat="${cat}" onclick="setFilter('${cat}')">
      ${label}<span class="pill-count">${count}</span>
    </button>`;
  }).join('');

  container.innerHTML = pillsHtml;
}

function buildCard(item) {
  const domain = getDomain(item.url);
  const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
  const s = item.status || 'active';
  const letter = item.name[0] || '?';
  const desc = item.desc || '';

  const badge = s === 'archived' ? '<span class="badge-archived">archived</span>'
              : s === 'stale'    ? '<span class="badge-stale">stale</span>'
              : '';
  const cls = s === 'archived' ? ' archived' : s === 'stale' ? ' stale' : '';

  const yearBadge = item.year ? `<span class="badge-year">📅 ${item.year}</span>` : '';
  const sizeBadge = item.size ? `<span class="badge-size">🗃️ ${item.size}</span>` : '';
  const metaRow = (yearBadge || sizeBadge)
    ? `<div class="card-meta">${yearBadge}${sizeBadge}</div>` : '';

  return `<a class="card${cls}" href="${item.url}" target="_blank" rel="noopener">
      <div class="card-favicon">
        <img src="${faviconUrl}" alt="" onerror="this.style.display='none';this.parentNode.innerHTML='<span class=&quot;favicon-letter&quot;>${letter}</span>'">
      </div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-name">${item.name}</span>
          <span class="card-url">${domain}</span>
          ${badge}
        </div>
        ${desc ? `<span class="card-desc">${desc}</span>` : ''}
        ${metaRow}
      </div>
    </a>`;
}

function renderGrid() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  const container = document.getElementById('main-content');
  const emptyState = document.getElementById('empty-state');

  // Group by category
  const grouped = {};
  let totalVisible = 0;

  const filtered = data.filter(item => {
    const matchSearch = !query || item.name.toLowerCase().includes(query) || getDomain(item.url).includes(query);
    return matchSearch;
  });

  filtered.forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = [];
    grouped[item.cat].push(item);
    totalVisible++;
  });

  emptyState.classList.add('hidden');

  const catOrder = CAT_ORDER.filter(c => c !== 'all');
  let html = '';

  catOrder.forEach(cat => {
    if (!grouped[cat] || grouped[cat].length === 0) return;
    html += `
      <div class="category-section" data-cat="${cat}">
        <h2 class="category-title">
          ${CAT_LABELS[cat] || cat}
          <span class="cat-count">${grouped[cat].length}</span>
        </h2>
        <div class="grid">
          ${grouped[cat].map(buildCard).join('')}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}



// Pills are SCROLL ANCHORS — never filter the list
function setFilter(cat) {
  if (cat === 'all') {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    highlightPill('all');
    return;
  }
  const section = document.querySelector(`.category-section[data-cat="${cat}"]`);
  if (section) {
    // offset by header height
const stickyH = document.getElementById('sticky-controls')?.offsetHeight || 0;
const top = section.getBoundingClientRect().top + window.scrollY - stickyH - 12;
    window.scrollTo({ top, behavior: 'smooth' });
  }
  highlightPill(cat);
}

function filterCards() {
  renderGrid();
  setTimeout(initScrollSpy, 80);
}

// ─────────────────────────────────────────────
// SCROLL-SPY  (scroll event, stable)
// ─────────────────────────────────────────────
function highlightPill(cat) {
  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-cat') === cat);
  });
}

function getCurrentCat() {
  const headerH = document.querySelector('header')?.offsetHeight || 0;
  // Threshold: 30% down from header bottom
  const threshold = headerH + window.innerHeight * 0.18;
  const sections = [...document.querySelectorAll('.category-section[data-cat]')];
  if (!sections.length) return 'all';

  // Walk from bottom up — first section whose top is above threshold wins
  let active = sections[0];
  for (const s of sections) {
    const top = s.getBoundingClientRect().top;
    if (top <= threshold) active = s;
  }
  // If the very first section hasn't reached threshold yet, show 'all'
  if (sections[0].getBoundingClientRect().top > threshold + 40) return 'all';
  return active.getAttribute('data-cat');
}

let rafPending = false;
function onScroll() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => {
    rafPending = false;
    highlightPill(getCurrentCat());
  });
}

function initScrollSpy() {
  window.removeEventListener('scroll', onScroll);
  const sections = document.querySelectorAll('.category-section[data-cat]');
  if (!sections.length) return;
  window.addEventListener('scroll', onScroll, { passive: true });
  // Fire once immediately
  highlightPill(getCurrentCat());
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderFilterPills();
renderGrid();
setTimeout(initScrollSpy, 100);

async function loadFromAirtable() {
  const token = document.getElementById('at-token').value.trim();
  const baseId = document.getElementById('at-base').value.trim();
  const tableName = document.getElementById('at-table').value.trim() || 'Stacks';
  const statusEl = document.getElementById('at-status');
  const spinner = document.getElementById('at-spinner');
  const btnText = document.getElementById('at-btn-text');

  if (!token || !baseId) {
    statusEl.textContent = '⚠ Token and Base ID required';
    statusEl.style.color = 'var(--dead)';
    return;
  }

  spinner.classList.remove('hidden');
  btnText.textContent = '';
  statusEl.textContent = 'Fetching...';
  statusEl.style.color = 'var(--muted)';

  try {
    const url = `https://api.airtable.com/v0/${baseId}/${encodeURIComponent(tableName)}?pageSize=100`;
    const res = await fetch(url, {
      headers: { Authorization: `Bearer ${token}` }
    });

    if (!res.ok) throw new Error(`Error ${res.status}`);
    const json = await res.json();

    const records = json.records || [];
    if (records.length === 0) {
      statusEl.textContent = '⚠ No records found';
      statusEl.style.color = 'var(--dead)';
      return;
    }

    // Map Airtable fields → our format
    const atData = records.map(r => {
      const f = r.fields;
      return {
        name: f.Name || f.name || 'Untitled',
        url: f.URL || f.url || f.Link || '#',
        cat: f.Category || f.category || 'Other',
        status: (f.Status || f.status || 'unknown').toLowerCase(),
        thumbnail: f.Thumbnail || f.thumbnail || null,
      };
    });

    data = atData;
    activeFilter = 'all';
    renderFilterPills();
    renderGrid();

    statusEl.textContent = `✓ Loaded ${records.length} records from Airtable`;
    statusEl.style.color = 'var(--accent)';

    // Auto-close bar
    setTimeout(() => { document.getElementById('airtable-bar').classList.remove('open'); }, 1500);

  } catch (err) {
    statusEl.textContent = `✗ ${err.message}`;
    statusEl.style.color = 'var(--dead)';
  } finally {
    spinner.classList.add('hidden');
    btnText.textContent = 'Load';
  }
}

// AIRTABLE

function openSubmitModal() {
  document.getElementById('submit-modal').classList.remove('hidden');
}

function closeSubmitModal() {
  document.getElementById('submit-modal').classList.add('hidden');
}

function submitStack() {
  const name = document.getElementById('stack-name').value.trim();
  const url = document.getElementById('stack-url').value.trim();
  const cat = document.getElementById('stack-category').value.trim();
  const desc = document.getElementById('stack-desc').value.trim();

  if (!name || !url) {
    alert("Name and URL required");
    return;
  }

  const subject = encodeURIComponent("New Stack Submission");
  const body = encodeURIComponent(
`Name: ${name}
URL: ${url}
Category: ${cat}
Description: ${desc}`
  );

  window.location.href = `mailto:mini@appvelvet.com?subject=${subject}&body=${body}`;
}
document.addEventListener('DOMContentLoaded', () => {


    const backBtn = document.getElementById('backToTop');

  function updateBackToTop(){
    if (!backBtn) return;
    const show = window.scrollY > 400;
    backBtn.classList.toggle('back-show', show);
    backBtn.classList.toggle('back-hidden', !show);
  }

  window.addEventListener('scroll', updateBackToTop, { passive: true });
  updateBackToTop();
  
});

</script>
<div class="modal-overlay hidden" id="submit-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Submit a Stack</h3>
      <button class="modal-close" onclick="closeSubmitModal()">×</button>
    </div>

    <div class="modal-body">
      <input type="text" id="stack-name" placeholder="Stack name">
      <input type="text" id="stack-url" placeholder="https://...">
      <input type="text" id="stack-category" placeholder="Category (AI, Design, Belgium...)">
      <textarea id="stack-desc" placeholder="Short description (optional)"></textarea>

      <button class="btn btn-primary" onclick="submitStack()">Send</button>
    </div>
  </div>
</div>
<button id="backToTop" class="back-to-top back-hidden" onclick="window.scrollTo({top:0, behavior:'smooth'})">
  ↑ Top
</button>
